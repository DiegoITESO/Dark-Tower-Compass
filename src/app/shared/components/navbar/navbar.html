<nav
  class="fixed top-0 left-0 right-0 z-50 border-b border-b-slate-200/20 bg-background/80 backdrop-blur-md"
>
  <div class="container mx-auto flex h-16 items-center justify-between px-4">
    <a 
      class="font-display text-xl font-bold tracking-wider text-accent" 
      routerLink="/"
      data-cy="nav-logo"
    >
      Dark Tower Compass
    </a>

    <div class="hidden md:flex items-center gap-6">
      <a
        class="font-display text-sm tracking-wide transition-colors hover:text-accent text-muted-foreground"
        routerLink="/characters"
        data-cy="nav-characters"
      >
        Personajes
      </a>
      <a
        class="font-display text-sm tracking-wide transition-colors hover:text-accent text-muted-foreground"
        routerLink="/map"
        data-cy="nav-map"
      >
        Lugares
      </a>
      <a
        class="font-display text-sm tracking-wide transition-colors hover:text-accent text-muted-foreground"
        routerLink="/events"
        data-cy="nav-events"
      >
        Eventos
      </a>
      
      @if (authService.userSignal()) {
        <a
          class="font-display text-sm tracking-wide transition-colors hover:text-accent text-muted-foreground"
          routerLink="/quiz"
          data-cy="nav-quiz"
        >
          Cuestionario
        </a>
      }

      @if (authService.userSignal()) {
        <a routerLink="/profile" data-cy="nav-profile-link">
          <button
            class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium transition-colors bg-background text-accent-foreground hover:bg-accent/90 h-9 rounded-md px-3 font-display text-xs border border-accent/40"
            data-cy="nav-profile-btn"
          >
            Mi Perfil
          </button>
        </a>
      } @else {
        <a routerLink="/auth" data-cy="nav-auth-link">
          <button
            class="inline-flex items-center justify-center gap-2 whitespace-nowrap font-medium transition-colors bg-crimson text-primary-foreground hover:bg-crimson/90 h-9 rounded-md px-3 font-display text-xs"
            data-cy="nav-login-btn"
          >
            Iniciar Sesión
          </button>
        </a>
      }
    </div>

    <button class="md:hidden text-foreground" data-cy="mobile-menu-btn">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-menu"
      >
        <line x1="4" x2="20" y1="12" y2="12"></line>
        <line x1="4" x2="20" y1="6" y2="6"></line>
        <line x1="4" x2="20" y1="18" y2="18"></line>
      </svg>
    </button>
  </div>
</nav>

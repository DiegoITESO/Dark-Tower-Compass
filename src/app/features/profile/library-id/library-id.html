<form
  class="relative min-h-[300px] w-[500px] p-8 rounded-lg shadow-[--shadow-glow-inactive] bg-library-card bg-cover bg-no-repeat animate-[--animate-fade-in-slide-up]"
>
  <!-- Header -->
  <div class="flex items-center justify-between mb-8 border-b border-crimson/30 pb-4">
    <div class="flex items-center gap-4">
      <img src="logo.png" alt="Library Logo" class="w-12 h-12 brightness-75 contrast-125" />
      <div>
        <h1 class="text-2xl font-display tracking-widest text-crimson text-glow">
          Derry Public Library
        </h1>
        <p class="text-muted-display uppercase">Official Member Identification</p>
      </div>
    </div>
  </div>

  <div class="flex gap-8">
    <!-- Photo Upload Section -->
    <div class="relative group">
      <label
        for="photo-upload"
        class="cursor-pointer block relative overflow-hidden border-2 border-stone-800 w-[130px] h-[160px] shadow-2xl"
      >
        <img
          src="foto.jpg"
          alt="Profile"
          class="w-full h-full object-cover sepia-[0.3] hover:sepia-0 transition-all duration-500"
        />
        <!-- Modern T4 Hover Overlay -->
        <div
          class="absolute inset-0 bg-background/80 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300"
        >
          <span class="font-display text-[10px] text-accent">Replace</span>
          <span class="font-display text-[10px] text-accent">Portrait</span>
        </div>
      </label>
      <input type="file" id="photo-upload" class="hidden" accept="image/*" />
    </div>

    <!-- Input Fields -->
    <div class="flex-1 space-y-5">
      <div class="credential-field-group">
        <label class="text-muted-display">Name of Bearer</label>
        <input
          type="text"
          name="name"
          placeholder="Escribe tu nombre aqui..."
          class="credential-input"
          [(ngModel)]="formData.name"
          (blur)="saveProfile()"
        />
      </div>

      <div class="credential-field-group">
        <label class="text-muted-display">Date of Enrollment</label>
        <input
          type="date"
          name="dob"
          value="April 19, 1982"
          class="credential-input"
          [(ngModel)]="formData.dob"
          (blur)="saveProfile()"
        />
      </div>

      <div class="credential-field-group">
        <label class="text-muted-display">Acclaimed Literature</label>
        <input
          type="text"
          name="favorite_book"
          placeholder="Cual es tu libro favorito?"
          value="It (Eso)"
          class="credential-input"
          [(ngModel)]="formData.favoriteBook"
          (blur)="saveProfile()"
        />
      </div>
    </div>
  </div>
</form>

<div class="min-h-screen pt-24 pb-16 flex items-center justify-center bg-slate-950">
    <div [@fadeInSlideUp] class="w-full max-w-md mx-4">
    
    <div class="bg-card border border-border rounded-lg p-8 border-glow shadow-2xl">
        
        <h1 class="font-display text-3xl font-bold tracking-wider text-glow text-center mb-2 text-white">
        {{ isLogin() ? "Bienvenido" : "Únete" }}
        </h1>
        
        <p class="text-center text-muted-foreground text-sm mb-8 italic text-slate-400">
        {{ isLogin() ? "Ingresa a la biblioteca de Derry" : "Obtén tu Derry Library ID" }}
        </p>

        <form (submit)="handleSubmit()" class="space-y-4">
        <div>
            <input
            type="email"
            placeholder="Email"
            [(ngModel)]="email"
            name="email"
            required
            class="w-full bg-slate-900 border border-slate-800 rounded px-4 py-2 text-white focus:outline-none focus:border-red-600 transition-colors font-body"
            />
        </div>
        
        <div>
            <input
            type="password"
            placeholder="Contraseña"
            [(ngModel)]="password"
            name="password"
            required
            minlength="6"
            class="w-full bg-slate-900 border border-slate-800 rounded px-4 py-2 text-white focus:outline-none focus:border-red-600 transition-colors font-body"
            />
        </div>

        <button 
            type="submit" 
            [disabled]="loading()"
            class="w-full bg-red-700 hover:bg-red-600 text-white font-display tracking-wide py-2 rounded transition-all disabled:opacity-50 disabled:cursor-not-allowed"
        >
            {{ loading() ? "Cargando..." : (isLogin() ? "Iniciar Sesión" : "Crear Cuenta") }}
        </button>
        </form>

        <button
        (click)="toggleMode()"
        class="mt-6 w-full text-center text-sm text-slate-500 hover:text-red-400 transition-colors"
        >
        {{ isLogin() ? "¿No tienes cuenta? Regístrate" : "¿Ya tienes cuenta? Inicia sesión" }}
        </button>
        
    </div>
    </div>
</div>
